<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Finanzen</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root {
  --bg: #0a0a0f;
  --s1: #13131a;
  --s2: #1a1a24;
  --s3: #22222f;
  --border: #2c2c3e;
  --text: #f0f0f8;
  --muted: #5c5c7a;
  --soft: #9898b8;
  --green: #00e5a0;
  --red: #ff5566;
  --blue: #4488ff;
  --yellow: #ffcc44;
  --purple: #aa88ff;
  --r: 14px;
  --rr: 20px;
  --nav: 64px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overscroll-behavior: none;
}

/* ── NAV BAR ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav) + env(safe-area-inset-bottom));
  background: rgba(13,13,20,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; padding-top: 8px;
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em; padding: 0;
  transition: color 0.15s;
}
.nav-item svg { width: 22px; height: 22px; stroke-width: 1.8; }
.nav-item.on { color: var(--green); }

/* ── PAGES ── */
.page {
  display: none;
  padding: 0 16px calc(var(--nav) + env(safe-area-inset-bottom) + 16px);
  padding-top: calc(env(safe-area-inset-top) + 16px);
  min-height: 100dvh;
  max-width: 430px; margin: 0 auto;
}
.page.on { display: block; }

/* ── HEADER ── */
.page-header {
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.04em; margin-bottom: 20px;
  color: var(--text);
}
.page-header span { color: var(--green); }

/* ── CARDS ── */
.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--rr);
  padding: 18px;
  margin-bottom: 12px;
}
.card-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}

/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.kpi-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px;
}
.kpi-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
.kpi-val { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; }
.kpi-val.g { color: var(--green); }
.kpi-val.r { color: var(--red); }
.kpi-val.b { color: var(--blue); }
.kpi-val.p { color: var(--purple); }

/* ── FORMS ── */
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
.field input, .field select {
  width: 100%; background: var(--s2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: inherit; font-size: 15px;
  padding: 12px 14px; outline: none;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus { border-color: var(--green); }
.field input::placeholder { color: var(--muted); }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn {
  width: 100%; border: none; border-radius: 12px;
  font-family: inherit; font-size: 15px; font-weight: 700;
  padding: 14px; cursor: pointer; transition: opacity 0.15s;
}
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--green); color: #000; }
.btn-ghost { background: var(--s2); color: var(--soft); border: 1px solid var(--border); margin-top: 8px; }

/* ── LISTS ── */
.list-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
}
.list-row:last-child { border: none; padding-bottom: 0; }
.list-info { display: flex; flex-direction: column; gap: 2px; }
.list-name { font-size: 14px; font-weight: 600; }
.list-sub { font-size: 11px; color: var(--muted); }
.list-right { display: flex; align-items: center; gap: 10px; }
.list-amt { font-size: 14px; font-weight: 700; }
.list-amt.g { color: var(--green); }
.list-amt.r { color: var(--red); }
.del { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1; }
.del:active { color: var(--red); }

/* ── CATEGORY PILLS ── */
.cat-pill {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 6px;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.cat-Lebensmittel { background: rgba(0,229,160,0.15); color: var(--green); }
.cat-Mobilität { background: rgba(68,136,255,0.15); color: var(--blue); }
.cat-Unterhaltung { background: rgba(170,136,255,0.15); color: var(--purple); }
.cat-Shopping { background: rgba(255,204,68,0.15); color: var(--yellow); }
.cat-Restaurant { background: rgba(255,85,102,0.15); color: var(--red); }
.cat-Fitness { background: rgba(0,229,160,0.12); color: var(--green); }
.cat-Sonstiges { background: rgba(92,92,122,0.2); color: var(--soft); }
.cat-Wohnen { background: rgba(68,136,255,0.12); color: var(--blue); }
.cat-Digitales { background: rgba(170,136,255,0.12); color: var(--purple); }

/* ── PROGRESS ── */
.prog-wrap { background: var(--s3); border-radius: 6px; height: 7px; margin: 10px 0 5px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 6px; background: var(--green); transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
.prog-bar.warn { background: var(--yellow); }
.prog-bar.full { background: var(--green); }

/* ── CHART ── */
.chart-wrap { height: 170px; margin-top: 6px; }

/* ── TABS ── */
.tabs { display: flex; background: var(--s2); border-radius: 10px; padding: 3px; margin-bottom: 14px; }
.tab {
  flex: 1; background: none; border: none;
  color: var(--muted); font-family: inherit;
  font-size: 13px; font-weight: 600; padding: 8px;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
}
.tab.on { background: var(--s3); color: var(--text); }

/* ── SUMMARY BAR ── */
.sum-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 12px; margin-top: 4px;
  border-top: 1px solid var(--border);
}
.sum-label { font-size: 12px; color: var(--muted); font-weight: 600; }
.sum-val { font-size: 15px; font-weight: 800; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: calc(var(--nav) + env(safe-area-inset-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--s3); color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 18px; border-radius: 30px;
  font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: all 0.25s; white-space: nowrap; z-index: 200;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LOADING ── */
#loader {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; z-index: 300;
}
.spin {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-size: 13px; color: var(--muted); }

.empty { text-align: center; color: var(--muted); padding: 28px 0; font-size: 14px; }

/* Section split */
.section-gap { margin-top: 20px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--soft); margin-bottom: 10px; letter-spacing: 0.02em; }
</style>
</head>
<body>

<div id="loader">
  <div class="spin"></div>
  <div class="load-txt">Laden…</div>
</div>
<div id="toast"></div>

<!-- ══ NAV ══ -->
<nav class="nav">
  <button class="nav-item on" onclick="go('dash')" id="n-dash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Dashboard
  </button>
  <button class="nav-item" onclick="go('fixk')" id="n-fixk">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    Finanzen
  </button>
  <button class="nav-item" onclick="go('ausg')" id="n-ausg">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
    Ausgaben
  </button>
  <button class="nav-item" onclick="go('spar')" id="n-spar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Sparziele
  </button>
</nav>

<!-- ══ DASHBOARD ══ -->
<div class="page on" id="p-dash">
  <div class="page-header">Deine<br><span>Finanzen</span></div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Einnahmen</div>
      <div class="kpi-val g" id="d-ein">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Fixkosten</div>
      <div class="kpi-val r" id="d-fix">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ausgaben (Mo.)</div>
      <div class="kpi-val r" id="d-aus">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Verfügbar</div>
      <div class="kpi-val b" id="d-free">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Ausgaben nach Kategorie</div>
    <div class="chart-wrap"><canvas id="catChart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-label">Letzte Ausgaben</div>
    <div id="d-latest"></div>
  </div>
</div>

<!-- ══ FINANZEN (Fixkosten & Einnahmen) ══ -->
<div class="page" id="p-fixk">
  <div class="page-header">Fixe<br><span>Posten</span></div>

  <div class="card">
    <div class="card-label">Neuer Eintrag</div>
    <div class="tabs">
      <button class="tab on" onclick="setTyp('Einnahme',this)">Einnahme</button>
      <button class="tab" onclick="setTyp('Ausgabe',this)">Ausgabe</button>
    </div>
    <div class="field"><label>Name</label><input id="fk-name" placeholder="z.B. Gehalt, Miete…"></div>
    <div class="row2">
      <div class="field"><label>Betrag (€)</label><input id="fk-betrag" type="number" placeholder="0" step="0.01" min="0"></div>
      <div class="field"><label>Kategorie</label>
        <select id="fk-kat">
          <option>Einkommen</option><option>Wohnen</option><option>Mobilität</option>
          <option>Digitales</option><option>Fitness</option><option>Verbindlichkeiten</option><option>Sonstiges</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addFixk()">Hinzufügen</button>
  </div>

  <div class="card section-gap">
    <div class="card-label">Einnahmen</div>
    <div id="fk-ein-list"><div class="empty">Keine Einträge</div></div>
    <div class="sum-bar">
      <span class="sum-label">Gesamt</span>
      <span class="sum-val" style="color:var(--green)" id="fk-ein-sum">0 €</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Fixkosten</div>
    <div id="fk-aus-list"><div class="empty">Keine Einträge</div></div>
    <div class="sum-bar">
      <span class="sum-label">Gesamt</span>
      <span class="sum-val" style="color:var(--red)" id="fk-aus-sum">0 €</span>
    </div>
  </div>
</div>

<!-- ══ AUSGABEN ══ -->
<div class="page" id="p-ausg">
  <div class="page-header">Ausgaben<br><span>erfassen</span></div>

  <div class="card">
    <div class="card-label">Neue Ausgabe</div>
    <div class="field"><label>Beschreibung</label><input id="a-name" placeholder="z.B. Rewe, Tankstelle…"></div>
    <div class="row2">
      <div class="field"><label>Betrag (€)</label><input id="a-betrag" type="number" placeholder="0" step="0.01" min="0"></div>
      <div class="field"><label>Kategorie</label>
        <select id="a-kat">
          <option>Lebensmittel</option><option>Restaurant</option><option>Mobilität</option>
          <option>Shopping</option><option>Unterhaltung</option><option>Fitness</option>
          <option>Digitales</option><option>Sonstiges</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addAusg()">Ausgabe speichern</button>
  </div>

  <div class="card section-gap">
    <div class="card-label">Verlauf</div>
    <div id="a-list"><div class="empty">Noch keine Ausgaben</div></div>
  </div>
</div>

<!-- ══ SPARZIELE ══ -->
<div class="page" id="p-spar">
  <div class="page-header">Spar<span>-</span><br><span>ziele</span></div>

  <div class="card">
    <div class="card-label">Neues Sparziel</div>
    <div class="field"><label>Name</label><input id="sz-name" placeholder="z.B. New York Trip"></div>
    <div class="row2">
      <div class="field"><label>Zielbetrag (€)</label><input id="sz-ziel" type="number" placeholder="0" step="0.01" min="0"></div>
      <div class="field"><label>Aktuell gespart (€)</label><input id="sz-aktuell" type="number" placeholder="0" step="0.01" min="0"></div>
    </div>
    <div class="field"><label>Zieldatum (optional)</label><input id="sz-datum" type="date"></div>
    <button class="btn btn-primary" onclick="addSz()">Sparziel anlegen</button>
  </div>

  <div id="sz-list" class="section-gap"></div>
</div>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://xzvkpdbghofpbrjpbjwq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6dmtwZGJnaG9mcGJyanBiandxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTY3MTQsImV4cCI6MjA5ODM5MjcxNH0.6tbYX4mfnDKnrk81bpvZWeVCTAEgHC42gr2zzqzUmnA';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ──
let fixkData = [], ausgData = [], szData = [];
let catChart = null;
let currentTyp = 'Einnahme';

// ── UTILS ──
const € = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
const €€ = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(v);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  document.getElementById('n-'+id).classList.add('on');
}

function setTyp(typ, btn) {
  currentTyp = typ;
  document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
}

// ── LOAD ──
async function loadAll() {
  const [fk, au, sz] = await Promise.all([
    db.from('fixkosten').select('*').order('typ').order('name'),
    db.from('ausgaben').select('*').order('created_at', {ascending:false}),
    db.from('sparziele').select('*').order('created_at')
  ]);
  fixkData = fk.data || [];
  ausgData = au.data || [];
  szData = sz.data || [];
  render();
  document.getElementById('loader').style.display = 'none';
}

function render() {
  renderDash();
  renderFixk();
  renderAusg();
  renderSz();
}

// ── DASHBOARD ──
function renderDash() {
  const ein = fixkData.filter(f=>f.typ==='Einnahme').reduce((a,b)=>a+parseFloat(b.betrag),0);
  const fix = fixkData.filter(f=>f.typ==='Ausgabe').reduce((a,b)=>a+parseFloat(b.betrag),0);

  const now = new Date();
  const moStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const moAus = ausgData.filter(a => a.created_at >= moStart).reduce((a,b)=>a+parseFloat(b.betrag),0);
  const frei = ein - fix - moAus;

  document.getElementById('d-ein').textContent = €(ein);
  document.getElementById('d-fix').textContent = €(fix);
  document.getElementById('d-aus').textContent = €(moAus);
  const fEl = document.getElementById('d-free');
  fEl.textContent = €(frei);
  fEl.className = 'kpi-val ' + (frei >= 0 ? 'b' : 'r');

  // Letzte Ausgaben
  const latest = ausgData.slice(0,5);
  const lEl = document.getElementById('d-latest');
  if (!latest.length) { lEl.innerHTML = '<div class="empty">Noch keine Ausgaben</div>'; }
  else {
    lEl.innerHTML = latest.map(a => {
      const d = new Date(a.created_at);
      const ds = d.toLocaleDateString('de-DE',{day:'2-digit',month:'short'});
      return `<div class="list-row">
        <div class="list-info">
          <span class="list-name">${a.name}</span>
          <span class="list-sub">${ds} · <span class="cat-pill cat-${a.kategorie}">${a.kategorie}</span></span>
        </div>
        <span class="list-amt r">${€€(parseFloat(a.betrag))}</span>
      </div>`;
    }).join('');
  }

  // Chart
  const cats = {};
  ausgData.filter(a => a.created_at >= moStart).forEach(a => {
    cats[a.kategorie] = (cats[a.kategorie]||0) + parseFloat(a.betrag);
  });
  const labels = Object.keys(cats);
  const values = Object.values(cats);
  const colors = ['#00e5a0','#4488ff','#aa88ff','#ffcc44','#ff5566','#00ccff','#ff8844','#88ff44'];

  const ctx = document.getElementById('catChart').getContext('2d');
  if (catChart) catChart.destroy();
  if (!labels.length) {
    ctx.canvas.style.display = 'none';
    return;
  }
  ctx.canvas.style.display = 'block';
  catChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets:[{ data:values, backgroundColor:colors.slice(0,labels.length), borderWidth:0, hoverOffset:6 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{ color:'#9898b8', font:{size:11}, boxWidth:10, padding:12 }},
        tooltip:{ callbacks:{ label: c => ` ${€€(c.raw)}` }}
      },
      cutout:'62%'
    }
  });
}

// ── FIXKOSTEN ──
function renderFixk() {
  const ein = fixkData.filter(f=>f.typ==='Einnahme');
  const aus = fixkData.filter(f=>f.typ==='Ausgabe');

  const mkList = (items, elId, cls) => {
    const el = document.getElementById(elId);
    if (!items.length) { el.innerHTML='<div class="empty">Keine Einträge</div>'; return; }
    el.innerHTML = items.map(i=>`<div class="list-row">
      <div class="list-info">
        <span class="list-name">${i.name}</span>
        <span class="list-sub">${i.kategorie||''}</span>
      </div>
      <div class="list-right">
        <span class="list-amt ${cls}">${€€(parseFloat(i.betrag))}</span>
        <button class="del" onclick="delFixk('${i.id}')">×</button>
      </div>
    </div>`).join('');
  };

  mkList(ein,'fk-ein-list','g');
  mkList(aus,'fk-aus-list','r');
  document.getElementById('fk-ein-sum').textContent = €€(ein.reduce((a,b)=>a+parseFloat(b.betrag),0));
  document.getElementById('fk-aus-sum').textContent = €€(aus.reduce((a,b)=>a+parseFloat(b.betrag),0));
}

async function addFixk() {
  const name = document.getElementById('fk-name').value.trim();
  const betrag = parseFloat(document.getElementById('fk-betrag').value);
  const kategorie = document.getElementById('fk-kat').value;
  if (!name||!betrag) return toast('Name und Betrag angeben');
  const {error} = await db.from('fixkosten').insert([{typ:currentTyp,name,betrag,kategorie}]);
  if (error) return toast('Fehler: '+error.message);
  document.getElementById('fk-name').value='';
  document.getElementById('fk-betrag').value='';
  toast('✓ Gespeichert');
  await loadAll();
}

async function delFixk(id) {
  await db.from('fixkosten').delete().eq('id',id);
  toast('Gelöscht'); await loadAll();
}

// ── AUSGABEN ──
function renderAusg() {
  const el = document.getElementById('a-list');
  if (!ausgData.length) { el.innerHTML='<div class="empty">Noch keine Ausgaben</div>'; return; }
  el.innerHTML = ausgData.map(a => {
    const d = new Date(a.created_at);
    const ds = d.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    return `<div class="list-row">
      <div class="list-info">
        <span class="list-name">${a.name}</span>
        <span class="list-sub">${ds} · <span class="cat-pill cat-${a.kategorie}">${a.kategorie}</span></span>
      </div>
      <div class="list-right">
        <span class="list-amt r">${€€(parseFloat(a.betrag))}</span>
        <button class="del" onclick="delAusg('${a.id}')">×</button>
      </div>
    </div>`;
  }).join('');
}

async function addAusg() {
  const name = document.getElementById('a-name').value.trim();
  const betrag = parseFloat(document.getElementById('a-betrag').value);
  const kategorie = document.getElementById('a-kat').value;
  if (!name||!betrag) return toast('Name und Betrag angeben');
  const {error} = await db.from('ausgaben').insert([{name,betrag,kategorie}]);
  if (error) return toast('Fehler: '+error.message);
  document.getElementById('a-name').value='';
  document.getElementById('a-betrag').value='';
  toast('✓ Ausgabe gespeichert');
  await loadAll();
}

async function delAusg(id) {
  await db.from('ausgaben').delete().eq('id',id);
  toast('Gelöscht'); await loadAll();
}

// ── SPARZIELE ──
function renderSz() {
  const el = document.getElementById('sz-list');
  if (!szData.length) { el.innerHTML='<div class="empty" style="padding:20px 0">Noch keine Sparziele</div>'; return; }
  el.innerHTML = szData.map(sz => {
    const ziel = parseFloat(sz.zielbetrag);
    const akt = parseFloat(sz.aktuell||0);
    const pct = Math.min(100, Math.round((akt/ziel)*100));
    const datum = sz.zieldatum ? new Date(sz.zieldatum).toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}) : null;
    const barCls = pct >= 100 ? 'full' : pct >= 70 ? 'warn' : '';
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
        <div>
          <div style="font-size:17px;font-weight:800;letter-spacing:-0.02em">${sz.name}</div>
          ${datum?`<div style="font-size:11px;color:var(--muted);margin-top:2px">Bis ${datum}</div>`:''}
        </div>
        <button class="del" onclick="delSz('${sz.id}')">×</button>
      </div>
      <div class="prog-wrap"><div class="prog-bar ${barCls}" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)">
        <span style="color:var(--green);font-weight:700">${€€(akt)}</span>
        <span>von ${€€(ziel)} · ${pct}%</span>
      </div>
      <div style="margin-top:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px">Betrag aktualisieren</div>
        <div style="display:flex;gap:8px">
          <input type="number" placeholder="Aktuell gespart…" step="0.01"
            style="flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none"
            id="sz-upd-${sz.id}">
          <button onclick="updSz('${sz.id}')" style="background:var(--green);color:#000;border:none;border-radius:10px;font-weight:700;font-size:13px;padding:10px 14px;cursor:pointer">OK</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function addSz() {
  const name = document.getElementById('sz-name').value.trim();
  const ziel = parseFloat(document.getElementById('sz-ziel').value);
  const akt = parseFloat(document.getElementById('sz-aktuell').value)||0;
  const datum = document.getElementById('sz-datum').value;
  if (!name||!ziel) return toast('Name und Zielbetrag angeben');
  const row = {name, zielbetrag:ziel, aktuell:akt};
  if (datum) row.zieldatum = datum;
  const {error} = await db.from('sparziele').insert([row]);
  if (error) return toast('Fehler: '+error.message);
  document.getElementById('sz-name').value='';
  document.getElementById('sz-ziel').value='';
  document.getElementById('sz-aktuell').value='';
  document.getElementById('sz-datum').value='';
  toast('✓ Sparziel gespeichert');
  await loadAll();
}

async function updSz(id) {
  const val = parseFloat(document.getElementById('sz-upd-'+id).value);
  if (isNaN(val)) return toast('Betrag eingeben');
  const {error} = await db.from('sparziele').update({aktuell:val}).eq('id',id);
  if (error) return toast('Fehler: '+error.message);
  toast('✓ Aktualisiert');
  await loadAll();
}

async function delSz(id) {
  await db.from('sparziele').delete().eq('id',id);
  toast('Gelöscht'); await loadAll();
}

loadAll();
</script>
</body>
</html>
